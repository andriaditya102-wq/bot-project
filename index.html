<!DOCTYPE html>
<html>
<head>
  <title>Bot Pro Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .log {
      background: black;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🤖 Bot Pro Dashboard</h1>

  <div class="grid">
    <div class="card">
      <h3>Status</h3>
      <p id="status">STOPPED</p>
    </div>
    <div class="card">
      <h3>Profit</h3>
      <p id="profit">0</p>
    </div>
    <div class="card">
      <h3>Connection</h3>
      <p id="connection">Disconnected</p>
    </div>
  </div>

  <button onclick="startBot()">Start</button>
  <button onclick="stopBot()">Stop</button>

  <h3>Log</h3>
  <div class="log" id="log"></div>

  <canvas id="chart"></canvas>
</div>

<script>
  const logDiv = document.getElementById("log");
  const profitText = document.getElementById("profit");
  const statusText = document.getElementById("status");
  const connectionText = document.getElementById("connection");

  let profitData = [];
  let labels = [];

  const ctx = document.getElementById("chart").getContext("2d");

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Profit',
        data: profitData
      }]
    }
  });

  function startBot() {
    fetch("http://127.0.0.1:8000/start");
    statusText.textContent = "RUNNING";
  }

  function stopBot() {
    fetch("http://127.0.0.1:8000/stop");
    statusText.textContent = "STOPPED";
  }

  const ws = new WebSocket("ws://127.0.0.1:8000/ws");

  ws.onopen = () => {
    connectionText.textContent = "Connected";
  };

  ws.onclose = () => {
    connectionText.textContent = "Disconnected";
  };

  ws.onmessage = function(event) {
    const data = JSON.parse(event.data);

    // update log
    const p = document.createElement("p");
    p.textContent = data.log;
    logDiv.appendChild(p);

    // update profit
    profitText.textContent = data.profit;

    // update chart
    profitData.push(data.profit);
    labels.push("");

    chart.update();

    logDiv.scrollTop = logDiv.scrollHeight;
  };
</script>

</body>
</html>
