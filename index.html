<script>
document.addEventListener("DOMContentLoaded", function () {

  const profitText = document.getElementById("profit");
  const statusText = document.getElementById("status");

  let profitData = [];
  let labels = [];

  const ctx = document.getElementById("chart").getContext("2d");
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Profit',
        data: profitData
      }]
    }
  });

  function startBot() {
    fetch('/start', { method: "POST" });
    statusText.textContent = "RUNNING";
  }

  function stopBot() {
    fetch('/stop', { method: "POST" });
    statusText.textContent = "STOPPED";
  }

  window.startBot = startBot;
  window.stopBot = stopBot;

  async function loadData() {
    try {
      const res = await fetch('/data');
      const data = await res.json();

      profitText.textContent = data.profit;
      statusText.textContent = data.running ? "RUNNING" : "STOPPED";

      profitData.push(data.profit);
      labels.push("");

      if (profitData.length > 20) {
        profitData.shift();
        labels.shift();
      }

      chart.update();
    } catch (err) {
      console.log("Error:", err);
    }
  }

  loadData(); // 🔥 langsung jalan
  setInterval(loadData, 2000);

});
</script>
