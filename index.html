<!DOCTYPE html>
<html>
<head>
  <title>Bot Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Bot Dashboard</h1>

<p>Status: <span id="status">STOPPED</span></p>
<p>Profit: <span id="profit">0</span></p>

<button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>

<canvas id="chart" width="300" height="150"></canvas>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const profitText = document.getElementById("profit");
  const statusText = document.getElementById("status");

  let profitData = [];
  let labels = [];

  const ctx = document.getElementById("chart").getContext("2d");
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Profit',
        data: profitData
      }]
    }
  });

  function startBot() {
    fetch('/start', { method: "POST" });
    statusText.textContent = "RUNNING";
  }

  function stopBot() {
    fetch('/stop', { method: "POST" });
    statusText.textContent = "STOPPED";
  }

  window.startBot = startBot;
  window.stopBot = stopBot;

  async function loadData() {
    const res = await fetch('/data');
    const data = await res.json();

    profitText.textContent = data.profit;

    profitData.push(data.profit);
    labels.push("");

    if (profitData.length > 20) {
      profitData.shift();
      labels.shift();
    }

    chart.update();
  }

  setInterval(loadData, 2000);

});
</script>

</body>
</html>
