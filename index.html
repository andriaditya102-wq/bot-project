<script>
  const profitText = document.getElementById("profit");
  const statusText = document.getElementById("status");

  const host = window.location.host;
  const protocol = window.location.protocol;

  const baseUrl = `${protocol}//${host}`;

  let profitData = [];
  let labels = [];

  const ctx = document.getElementById("chart").getContext("2d");
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Profit',
        data: profitData,
        borderColor: '#38bdf8',
        tension: 0.1
      }]
    }
  });

  function startBot() {
    fetch(`${baseUrl}/start`, { method: "POST" });
    statusText.textContent = "RUNNING";
  }

  function stopBot() {
    fetch(`${baseUrl}/stop`, { method: "POST" });
    statusText.textContent = "STOPPED";
  }

  // 🔥 GANTI WEBSOCKET → POLLING
  async function loadData() {
    const res = await fetch(`${baseUrl}/data`);
    const data = await res.json();

    profitText.textContent = data.profit;

    profitData.push(data.profit);
    labels.push("");

    if (profitData.length > 20) {
      profitData.shift();
      labels.shift();
    }

    chart.update();
  }

  setInterval(loadData, 2000);
</script>
