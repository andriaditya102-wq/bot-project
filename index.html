<script>
  const logDiv = document.getElementById("log");
  const profitText = document.getElementById("profit");
  const statusText = document.getElementById("status");
  const connectionText = document.getElementById("connection");

  // Deteksi Otomatis Alamat Server (PENTING!)
  const host = window.location.host;
  const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  
  // Jika dijalankan lokal tetap pakai localhost, jika di cloud pakai domain server
  const baseUrl = host.includes('127.0.0.1') || host.includes('localhost') 
                  ? `${protocol}//127.0.0.1:8000` 
                  : `${protocol}//${host}`;
  const wsUrl = host.includes('127.0.0.1') || host.includes('localhost') 
                ? `ws://127.0.0.1:8000/ws` 
                : `${wsProtocol}//${host}/ws`;

  let profitData = [];
  let labels = [];

  const ctx = document.getElementById("chart").getContext("2d");
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Profit',
        data: profitData,
        borderColor: '#38bdf8',
        tension: 0.1
      }]
    }
  });

  function startBot() {
    fetch(`${baseUrl}/start`);
    statusText.textContent = "RUNNING";
    statusText.style.color = "#22c55e";
  }

  function stopBot() {
    fetch(`${baseUrl}/stop`);
    statusText.textContent = "STOPPED";
    statusText.style.color = "#ef4444";
  }

  // WebSocket Connection
  function connect() {
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      connectionText.textContent = "Connected";
      connectionText.style.color = "#22c55e";
    };

    ws.onclose = () => {
      connectionText.textContent = "Disconnected";
      connectionText.style.color = "#ef4444";
      setTimeout(connect, 2000); // Reconnect otomatis jika putus
    };

    ws.onmessage = function(event) {
      const data = JSON.parse(event.data);
      const p = document.createElement("p");
      p.textContent = `[${new Date().toLocaleTimeString()}] ${data.log}`;
      logDiv.appendChild(p);
      profitText.textContent = data.profit;
      profitData.push(data.profit);
      labels.push("");
      if (profitData.length > 20) { // Batasi data chart agar tidak berat
        profitData.shift();
        labels.shift();
      }
      chart.update();
      logDiv.scrollTop = logDiv.scrollHeight;
    };
  }

  connect();
</script>
